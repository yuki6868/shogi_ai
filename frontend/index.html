<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>将棋AI - 盤面UI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3efe5;
      color: #2f261d;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      align-items: start;
    }

    .game-area,
    .side-panel {
      background: #fffaf0;
      border: 1px solid rgba(80, 55, 30, 0.18);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(80, 55, 30, 0.14);
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.04em;
    }

    .lead {
      margin: 0 0 20px;
      color: #756556;
      line-height: 1.7;
    }

    .evaluation-panel {
      margin: 16px 0 20px;
      padding: 16px;
      border-radius: 18px;
      background: #2f261d;
      color: #fffaf0;
      box-shadow: 0 12px 28px rgba(47, 38, 29, 0.22);
    }

    .evaluation-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #d8c6aa;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .evaluation-score {
      margin: 10px 0;
      text-align: center;
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
    }

    .evaluation-score.plus {
      color: #7dd3fc;
    }

    .evaluation-score.minus {
      color: #fca5a5;
    }

    .evaluation-score.zero {
      color: #fffaf0;
    }

    .win-rate-wrap {
      display: grid;
      gap: 8px;
    }

    .win-rate-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      font-size: 14px;
      color: #f4e6cf;
    }

    .player-side {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .ai-side {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .win-rate-bar {
      width: 100%;
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #7dd3fc;
      border: 1px solid rgba(255, 250, 240, 0.25);
    }

    .player-win-rate-bar {
      height: 100%;
      background: #fca5a5;
      transition: width 0.25s ease;
    }

    .policy-selected {
      background: rgba(250, 204, 21, 0.18);
      border-radius: 10px;
      padding-left: 8px;
      padding-right: 8px;
    }

    .hands {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0;
    }

    .hand-box {
      flex: 1;
      min-height: 58px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #efe2c9;
      border: 1px solid rgba(80, 55, 30, 0.16);
      font-size: 14px;
      color: #5c4b3b;
    }

    .hand-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .hand-piece-button {
      margin-right: 6px;
      margin-bottom: 6px;
      padding: 7px 10px;
      border: none;
      border-radius: 10px;
      background: #4b3521;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .hand-piece-button.selected {
      background: #9c6428;
    }

    .board-wrap {
      display: flex;
      justify-content: center;
      margin: 16px 0;
    }

    .board {
      width: min(720px, 100%);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      background: #d6a85f;
      border: 4px solid #4b3521;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.25);
    }

    .cell {
      position: relative;
      border-right: 1px solid rgba(60, 38, 18, 0.75);
      border-bottom: 1px solid rgba(60, 38, 18, 0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s ease;
    }

    .cell:nth-child(9n) {
      border-right: none;
    }

    .cell:nth-last-child(-n + 9) {
      border-bottom: none;
    }

    .cell.selected {
      background: rgba(255, 255, 255, 0.35);
      outline: 3px solid rgba(120, 60, 20, 0.65);
      outline-offset: -3px;
    }

    .cell.can-move {
      background: rgba(255, 255, 255, 0.18);
    }

    .cell.last-move-from.effect-standard,
    .cell.last-move-from.effect-fancy {
      background: rgba(59, 130, 246, 0.28);
      box-shadow: inset 0 0 0 4px rgba(37, 99, 235, 0.65);
    }

    .cell.last-move-to.effect-standard,
    .cell.last-move-to.effect-fancy {
      background: rgba(250, 204, 21, 0.45);
      box-shadow: inset 0 0 0 4px rgba(202, 138, 4, 0.75);
    }

    .cell.last-move-to.effect-standard::after,
    .cell.last-move-to.effect-fancy::after {
      content: "着";
      position: absolute;
      right: 4px;
      bottom: 3px;
      font-size: 12px;
      font-weight: 900;
      color: #4b3521;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      padding: 1px 5px;
    }

    .cell.last-move-drop.effect-standard,
    .cell.last-move-drop.effect-fancy {
      background: rgba(34, 197, 94, 0.30);
      box-shadow: inset 0 0 0 4px rgba(22, 163, 74, 0.70);
    }

    .cell.last-move-drop.effect-standard::after,
    .cell.last-move-drop.effect-fancy::after {
      content: "打";
      position: absolute;
      right: 4px;
      bottom: 3px;
      font-size: 12px;
      font-weight: 900;
      color: #14532d;
      background: rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      padding: 1px 5px;
    }

    .cell.effect-fancy.last-move-from,
    .cell.effect-fancy.last-move-to,
    .cell.effect-fancy.last-move-drop {
      animation: moveFlash 0.75s ease-out 0s 2;
    }

    .cell.effect-fancy.last-move-to::before,
    .cell.effect-fancy.last-move-drop::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.9);
      animation: moveRing 0.85s ease-out 0s 2;
      pointer-events: none;
    }

    @keyframes moveFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes moveRing {
      0% { opacity: 0.95; transform: scale(0.65); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    .policy-box {
      margin-top: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #2f261d;
      color: #fffaf0;
      font-size: 13px;
      line-height: 1.6;
      max-height: 260px;
      overflow-y: auto;
    }

    .policy-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 250, 240, 0.16);
    }

    .policy-row:last-child {
      border-bottom: none;
    }

    .policy-move-id {
      font-weight: 800;
    }

    .policy-score {
      color: #facc15;
      font-variant-numeric: tabular-nums;
    }

    .piece {
      width: 72%;
      height: 82%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: clamp(18px, 4vw, 34px);
      color: #27180c;
      background: linear-gradient(180deg, #f8df9b 0%, #e7bd63 100%);
      clip-path: polygon(50% 0%, 88% 22%, 82% 100%, 18% 100%, 12% 22%);
      border: 1px solid rgba(60, 38, 18, 0.5);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
      box-shadow: 0 3px 5px rgba(60, 38, 18, 0.25);

      white-space: nowrap;
      line-height: 1;
      letter-spacing: -0.08em;
      box-sizing: border-box;
    }

    .piece.flipped-piece {
      transform: rotate(180deg);
    }

    .board-toolbar {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }

    .piece.promoted {
      color: #9f2a15;
    }

    .piece.two-letter {
      font-size: clamp(14px, 3vw, 24px);
    }

    .status-title {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .status-box {
      padding: 14px;
      border-radius: 16px;
      background: #f3ead7;
      line-height: 1.7;
      color: #5c4b3b;
      min-height: 120px;
      white-space: pre-wrap;
    }

    .buttons {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    button.main-button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #4b3521;
      color: white;
    }

    .side-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .side-button {
      border: 1px solid rgba(80, 55, 30, 0.22);
      border-radius: 14px;
      padding: 10px;
      font-weight: 800;
      cursor: pointer;
      background: #efe2c9;
      color: #4b3521;
    }

    .side-button.active {
      background: #4b3521;
      color: white;
    }


    .clock-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .clock-card {
      padding: 12px;
      border-radius: 16px;
      background: #f3ead7;
      border: 1px solid rgba(80, 55, 30, 0.14);
      text-align: center;
    }

    .clock-card.active {
      outline: 3px solid rgba(75, 53, 33, 0.28);
      background: #fff5df;
    }

    .clock-label {
      font-size: 13px;
      font-weight: 800;
      color: #6b5744;
      margin-bottom: 4px;
    }

    .clock-time {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #3d2b1c;
      font-variant-numeric: tabular-nums;
    }

    .clock-time.danger {
      color: #b3261e;
    }

    .time-control-select {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .note {
      margin-top: 18px;
      color: #8a7a68;
      font-size: 13px;
      line-height: 1.7;
    }


    .promotion-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.38);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .promotion-panel.open {
      display: flex;
    }

    .promotion-dialog {
      width: min(360px, 100%);
      padding: 22px;
      border-radius: 20px;
      background: #fffaf0;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      text-align: center;
      border: 2px solid rgba(75, 53, 33, 0.22);
    }

    .promotion-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 900;
      color: #3d2b1c;
    }

    .promotion-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .start-button {
      width: 100%;
      margin: 0 0 14px;
      background: #7c2d12 !important;
    }

    @media (max-width: 900px) {
      body {
        align-items: start;
        padding: 14px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .game-area,
      .side-panel {
        padding: 16px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="game-area">
      <h1 class="title">将棋AI 盤面UI</h1>

      <div class="evaluation-panel">
        <div class="evaluation-top">
          <span>AI評価値</span>
          <span id="evalMode">DRAMA MODE</span>
        </div>

        <div id="evalScore" class="evaluation-score">0</div>

        <div class="win-rate-wrap">
          <div class="win-rate-header">
            <div class="player-side">
              <span>プレイヤー</span>
              <span id="playerWinRate">50%</span>
            </div>

            <div class="ai-side">
              <span>AI</span>
              <span id="aiWinRate">50%</span>
            </div>
          </div>

          <div class="win-rate-bar">
            <div
              id="playerWinRateBar"
              class="player-win-rate-bar"
              style="width: 50%;"
            ></div>
          </div>
        </div>
      </div>

      <div class="hands">
        <div class="hand-box">
          <div class="hand-title">後手の持ち駒</div>
          <div id="enemyHand"></div>
        </div>
      </div>

      <div class="board-toolbar">
        <button class="main-button" type="button" onclick="toggleBoardRotation()">
          盤面を回転
        </button>
      </div>

      <div class="board-wrap">
        <div id="board" class="board"></div>
      </div>

      <div class="hands">
        <div class="hand-box">
          <div class="hand-title">先手の持ち駒</div>
          <div id="playerHand"></div>
        </div>
      </div>
    </section>

    <aside class="side-panel">
      <h2 class="status-title">対局設定</h2>
      <div class="side-select">
        <button id="playSenteButton" class="side-button active" type="button" onclick="setHumanSide('player')">
          先手で遊ぶ
        </button>
        <button id="playGoteButton" class="side-button" type="button" onclick="setHumanSide('enemy')">
          後手で遊ぶ
        </button>
      </div>

      <h2 class="status-title">持ち時間</h2>
      <button id="startGameButton" class="main-button start-button" type="button" onclick="startGame()">
        対局スタート
      </button>

      <div class="time-control-select">
        <button id="timeNoLimitButton" class="side-button" type="button" onclick="setTimeControl(0)">無制限</button>
        <button id="time3Button" class="side-button active" type="button" onclick="setTimeControl(180)">3分切れ負け</button>
        <button id="time10Button" class="side-button" type="button" onclick="setTimeControl(600)">10分切れ負け</button>
      </div>

      <div class="clock-panel">
        <div id="playerClockCard" class="clock-card">
          <div class="clock-label">先手</div>
          <div id="playerClock" class="clock-time">03:00</div>
        </div>
        <div id="enemyClockCard" class="clock-card">
          <div class="clock-label">後手</div>
          <div id="enemyClock" class="clock-time">03:00</div>
        </div>
      </div>

      <h2 class="status-title">打ち手エフェクト</h2>
      <div class="time-control-select">
        <button id="effectStandardButton" class="side-button active" type="button" onclick="setMoveEffectMode('standard')">標準</button>
        <button id="effectFancyButton" class="side-button" type="button" onclick="setMoveEffectMode('fancy')">派手</button>
        <button id="effectNoneButton" class="side-button" type="button" onclick="setMoveEffectMode('none')">なし</button>
      </div>

      <h2 class="status-title">状況</h2>
      <div id="status" class="status-box">駒をクリックして選択してください。</div>

      <h2 class="status-title">候補手AI</h2>
      <div id="policyCandidates" class="policy-box">
        まだ候補手はありません。
      </div>

      <div class="buttons">
        <button class="main-button" type="button" onclick="resetGame()">初期配置に戻す</button>
        <button class="main-button" type="button" onclick="clearSelection()">選択を解除</button>
        <button class="main-button" type="button" onclick="sendBoardToPython()">Pythonへ盤面送信</button>
      </div>
    </aside>
  </main>

  <div id="promotionPanel" class="promotion-panel">
    <div class="promotion-dialog">
      <p id="promotionTitle" class="promotion-title">成りますか？</p>
      <div class="promotion-buttons">
        <button class="main-button" type="button" onclick="answerPromotion(true)">成る</button>
        <button class="main-button" type="button" onclick="answerPromotion(false)">成らない</button>
      </div>
    </div>
  </div>
  <script>
    const boardElement = document.getElementById("board");
    const statusElement = document.getElementById("status");

    const PIECES = {
      KING_PLAYER: "玉",
      KING_ENEMY: "王",
      ROOK: "飛",
      BISHOP: "角",
      GOLD: "金",
      SILVER: "銀",
      KNIGHT: "桂",
      LANCE: "香",
      PAWN: "歩"
    };

    let board = [];
    let turn = "player";
    let selected = null;
    let selectedHandPiece = null;
    let selectionRequestId = 0;
    let playerHand = [];
    let enemyHand = [];
    let legalMovesCache = [];

    let humanSide = "player"; // player=先手, enemy=後手
    let aiSide = "enemy";
    let boardFlipped = false;

    let playerLevel = 0.35;
    let currentEvalScore = 0;

    let lastMove = null;
    let moveEffectMode = "standard"; // standard / fancy / none
    let gameStarted = false;
    let pendingPromotionResolver = null;

    // 持ち時間管理。0なら無制限、180なら3分切れ負け、600なら10分切れ負け。
    let timeControlSeconds = 180;
    let playerTimeLeft = timeControlSeconds;
    let enemyTimeLeft = timeControlSeconds;
    let timerIntervalId = null;
    let lastTimerTickMs = null;
    let gameOver = false;

    function player(type) {
      return { type, owner: "player", promoted: false };
    }

    function enemy(type) {
      return { type, owner: "enemy", promoted: false };
    }

    function aiPieceToJapanese(type) {
      const map = {
        "P": "歩",
        "L": "香",
        "N": "桂",
        "S": "銀",
        "G": "金",
        "B": "角",
        "R": "飛",
        "K": "王",
        "+P": "と",
        "+L": "成香",
        "+N": "成桂",
        "+S": "成銀",
        "+B": "馬",
        "+R": "龍"
      };

      return map[type] || type;
    }

    function promotePieceType(type) {
      const map = {
        "歩": "と",
        "香": "成香",
        "桂": "成桂",
        "銀": "成銀",
        "飛": "龍",
        "角": "馬"
      };

      return map[type] || type;
    }

    function ownerLabel(owner) {
      return owner === "player" ? "先手" : "後手";
    }

    function isHumanTurn() {
      return turn === humanSide;
    }

    function isAiTurn() {
      return turn === aiSide;
    }

    function rememberLastMove(move) {
      lastMove = move;
    }

    function isSameSquare(a, row, col) {
      return a && a.row === row && a.col === col;
    }

    function clearLastMove() {
      lastMove = null;
    }

    function updateMoveEffectButtons() {
      const buttons = [
        { id: "effectStandardButton", mode: "standard" },
        { id: "effectFancyButton", mode: "fancy" },
        { id: "effectNoneButton", mode: "none" }
      ];

      buttons.forEach((item) => {
        const button = document.getElementById(item.id);
        if (!button) return;
        button.classList.toggle("active", moveEffectMode === item.mode);
      });
    }

    function setMoveEffectMode(mode) {
      moveEffectMode = mode;
      updateMoveEffectButtons();
      renderBoard();
    }

    function addMoveEffectClass(cell) {
      if (moveEffectMode === "none") return;
      cell.classList.add(moveEffectMode === "fancy" ? "effect-fancy" : "effect-standard");
    }

    function updateStartButton() {
      const button = document.getElementById("startGameButton");
      if (!button) return;
      button.disabled = gameStarted || gameOver;
      button.textContent = gameStarted ? "対局中" : "対局スタート";
    }

    function askPromotion(pieceName) {
      const panel = document.getElementById("promotionPanel");
      const title = document.getElementById("promotionTitle");

      if (title) title.textContent = `${pieceName}を成りますか？`;
      if (panel) panel.classList.add("open");

      return new Promise((resolve) => {
        pendingPromotionResolver = resolve;
      });
    }

    function answerPromotion(shouldPromote) {
      const panel = document.getElementById("promotionPanel");
      if (panel) panel.classList.remove("open");

      if (pendingPromotionResolver) {
        pendingPromotionResolver(shouldPromote);
        pendingPromotionResolver = null;
      }
    }

    function updateSideButtons() {
      const senteButton = document.getElementById("playSenteButton");
      const goteButton = document.getElementById("playGoteButton");

      if (!senteButton || !goteButton) return;

      senteButton.classList.toggle("active", humanSide === "player");
      goteButton.classList.toggle("active", humanSide === "enemy");
    }


    function formatClock(seconds) {
      if (timeControlSeconds <= 0) return "--:--";

      const safeSeconds = Math.max(0, Math.ceil(seconds));
      const minutes = Math.floor(safeSeconds / 60);
      const restSeconds = safeSeconds % 60;

      return `${String(minutes).padStart(2, "0")}:${String(restSeconds).padStart(2, "0")}`;
    }

    function getTimeLeft(owner) {
      return owner === "player" ? playerTimeLeft : enemyTimeLeft;
    }

    function setTimeLeft(owner, seconds) {
      if (owner === "player") {
        playerTimeLeft = seconds;
      } else {
        enemyTimeLeft = seconds;
      }
    }

    function updateTimeControlButtons() {
      const buttons = [
        { id: "timeNoLimitButton", seconds: 0 },
        { id: "time3Button", seconds: 180 },
        { id: "time10Button", seconds: 600 }
      ];

      buttons.forEach((item) => {
        const button = document.getElementById(item.id);
        if (!button) return;
        button.classList.toggle("active", timeControlSeconds === item.seconds);
      });
    }

    function updateClockUI() {
      const playerClock = document.getElementById("playerClock");
      const enemyClock = document.getElementById("enemyClock");
      const playerCard = document.getElementById("playerClockCard");
      const enemyCard = document.getElementById("enemyClockCard");

      if (playerClock) {
        playerClock.textContent = formatClock(playerTimeLeft);
        playerClock.classList.toggle("danger", timeControlSeconds > 0 && playerTimeLeft <= 30);
      }

      if (enemyClock) {

    function stopTurnTimer() {

      lastTimerTickMs = Date.now();
      timerIntervalId = setInterval(() => {
        const now = Date.now();

        lastTimerTickMs = now;

        const next = Math.max(0, getTimeLeft(turn) - elapsedSeconds);
        setTimeLeft(turn, next);
        updateClockUI();

        if (next <= 0) {
          handleTimeUp(turn);
        }

    function createInitialBoard() {
      const empty = Array.from({ length: 9 }, () => Array(9).fill(null));

      empty[0] = [
        enemy(PIECES.LANCE), enemy(PIECES.KNIGHT), enemy(PIECES.SILVER), enemy(PIECES.GOLD), enemy(PIECES.KING_ENEMY),
        enemy(PIECES.GOLD), enemy(PIECES.SILVER), enemy(PIECES.KNIGHT), enemy(PIECES.LANCE)
      ];
      empty[1][1] = enemy(PIECES.ROOK);
      empty[1][7] = enemy(PIECES.BISHOP);
      empty[2] = Array.from({ length: 9 }, () => enemy(PIECES.PAWN));

      empty[6] = Array.from({ length: 9 }, () => player(PIECES.PAWN));
      empty[7][1] = player(PIECES.BISHOP);
      empty[7][7] = player(PIECES.ROOK);
      empty[8] = [
        player(PIECES.LANCE), player(PIECES.KNIGHT), player(PIECES.SILVER), player(PIECES.GOLD), player(PIECES.KING_PLAYER),
        player(PIECES.GOLD), player(PIECES.SILVER), player(PIECES.KNIGHT), player(PIECES.LANCE)
      ];

      return empty;
    }

    function getForward(owner) {
      return owner === "player" ? -1 : 1;
    }

    function isInsideBoard(row, col) {
      return row >= 0 && row < 9 && col >= 0 && col < 9;
    }

    function isLegalMove(piece, fromRow, fromCol, toRow, toCol) {
      if (!piece) return false;
      if (!isInsideBoard(toRow, toCol)) return false;

      const targetPiece = board[toRow][toCol];
      if (targetPiece && targetPiece.owner === piece.owner) return false;

      const dr = toRow - fromRow;
      const dc = toCol - fromCol;
      const forward = getForward(piece.owner);
      const absDr = Math.abs(dr);
      const absDc = Math.abs(dc);

      switch (piece.type) {
        case PIECES.PAWN:
          return dr === forward && dc === 0;

        case PIECES.LANCE:
          return dc === 0 && dr * forward > 0 && isPathClear(fromRow, fromCol, toRow, toCol);

        case PIECES.KNIGHT:
          return dr === forward * 2 && absDc === 1;

        case PIECES.SILVER:
          return (dr === forward && absDc <= 1) || (dr === -forward && absDc === 1);

        case PIECES.GOLD:
        case "と":
        case "成香":
        case "成桂":
        case "成銀":
          return (
            (dr === forward && absDc <= 1) ||
            (dr === 0 && absDc === 1) ||
            (dr === -forward && dc === 0)
          );

        case PIECES.KING_PLAYER:
        case PIECES.KING_ENEMY:
          return absDr <= 1 && absDc <= 1 && !(dr === 0 && dc === 0);

        case PIECES.ROOK:
          return (dr === 0 || dc === 0) && isPathClear(fromRow, fromCol, toRow, toCol);

        case PIECES.BISHOP:
          return absDr === absDc && isPathClear(fromRow, fromCol, toRow, toCol);

        case "龍":
          return (
            ((dr === 0 || dc === 0) && isPathClear(fromRow, fromCol, toRow, toCol)) ||
            (absDr === 1 && absDc === 1)
          );

        case "馬":
          return (
            (absDr === absDc && isPathClear(fromRow, fromCol, toRow, toCol)) ||
            ((absDr === 1 && dc === 0) || (dr === 0 && absDc === 1))
          );

        default:
          return false;
      }
    }

    async function fetchLegalMovesFromPython() {
      const payload = {
        board: board,
        playerHand: playerHand,
        enemyHand: enemyHand,
        turn: turn
      };

      const res = await fetch("http://127.0.0.1:8000/api/legal-moves", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const errorText = await res.text();
        console.error("合法手APIエラー:", res.status, errorText);
        setStatus(`合法手APIエラー: ${res.status}`);
        return [];
      }

      const data = await res.json();
      legalMovesCache = data.moves || [];

      // 重要:
      // /api/legal-moves は合法手確認用なので、AI候補手表示を上書きしない。
      // ここで updatePolicyCandidatesUI([]) すると、
      // AIの候補手が一瞬表示された後、先手番の合法手確認で消える。
      if (data.policyCandidates && data.policyCandidates.length > 0) {
        updatePolicyCandidatesUI(data.policyCandidates);
      }

      return legalMovesCache;
    }

    function clearLegalMovesCache() {
      legalMovesCache = [];
    }

    function findLegalMovesForSelected(row, col) {
      if (selected) {
        return legalMovesCache.filter((move) => {
          return (
            !move.drop &&
            move.from &&
            move.from.row === selected.row &&
            move.from.col === selected.col &&
            move.to.row === row &&
            move.to.col === col
          );
        });
      }

      if (selectedHandPiece) {
        return legalMovesCache.filter((move) => {
          return (
            move.drop &&
            aiPieceToJapanese(move.piece) === selectedHandPiece.type &&
            move.to.row === row &&
            move.to.col === col
          );
        });
      }

      return [];
    }

    async function findLegalMoveForSelectedAsync(row, col) {
      let legalMove = findLegalMoveForSelected(row, col);

      if (legalMove) {
        return legalMove;
      }

      // 合法手キャッシュがまだ空・古い可能性があるので、Pythonから取り直す
      await fetchLegalMovesFromPython();

      legalMove = findLegalMoveForSelected(row, col);

      return legalMove;
    }

    function findLegalMoveForSelected(row, col) {
      const moves = findLegalMovesForSelected(row, col);
      return moves[0] || null;
    }

    function shouldFlipPiece(pieceOwner) {
      if (!boardFlipped) {
        return pieceOwner === "enemy";
      }

      return pieceOwner === "player";
    }

    function toDisplayPosition(row, col) {
      if (!boardFlipped) {
        return { row, col };
      }

      return {
        row: 8 - row,
        col: 8 - col
      };
    }

    function toBoardPosition(displayRow, displayCol) {
      if (!boardFlipped) {
        return { row: displayRow, col: displayCol };
      }

      return {
        row: 8 - displayRow,
        col: 8 - displayCol
      };
    }

    function toggleBoardRotation() {
      boardFlipped = !boardFlipped;
      renderBoard();
    }

    async function chooseLegalMoveForSelected(row, col) {
      let moves = findLegalMovesForSelected(row, col);

      if (moves.length === 0) {
        await fetchLegalMovesFromPython();
        moves = findLegalMovesForSelected(row, col);
      }

      if (moves.length === 0) {
        return null;
      }

      if (moves.length === 1) {
        return moves[0];
      }

      const promoteMove = moves.find((move) => move.promote === true);
      const nonPromoteMove = moves.find((move) => move.promote === false);

      if (promoteMove && nonPromoteMove) {
        const shouldPromote = window.confirm("成りますか？");
        return shouldPromote ? promoteMove : nonPromoteMove;
      }

      return moves[0];
    }

    function isSelectedLegalMove(row, col) {
      return findLegalMovesForSelected(row, col).length > 0;
    }

    function hasAnyLegalMoveFromSquare(row, col) {
      return legalMovesCache.some((move) => {
        return (
          !move.drop &&
          move.from &&
          move.from.row === row &&
          move.from.col === col
        );
      });
    }

        enemyHand: enemyHand,

      };

      try {

          },

        });

        if (!res.ok) {

    function updatePolicyCandidatesUI(candidates, selectedMoveId = null) {

    function aiPieceToJapanese(type) {
      const map = {
        "P": "歩",
        "L": "香",
        "N": "桂",
        "S": "銀",
        "G": "金",
        "B": "角",
        "R": "飛",
        "K": "王",
        "+P": "と",
        "+L": "成香",
        "+N": "成桂",
        "+S": "成銀",
        "+B": "馬",
        "+R": "龍"
      };

      return map[type] || type;
    }

    function promotePieceType(type) {
      const map = {
        "歩": "と",
        "香": "成香",
        "桂": "成桂",
        "銀": "成銀",
        "飛": "龍",
        "角": "馬"
      };

      return map[type] || type;
    }

    function demotePiece(type) {
      const map = {
        "と": "歩",
        "成香": "香",
        "成桂": "桂",
        "成銀": "銀",
        "馬": "角",
        "龍": "飛"
      };

      return map[type] || type;
    }

    function removeOnePieceFromHand(hand, pieceType) {
      const index = hand.indexOf(pieceType);

      if (index >= 0) {
        hand.splice(index, 1);
      } else {
        console.warn("持ち駒から削除できませんでした", pieceType, hand);
      }
    }

    function applyAiMove(move) {
      console.log("AIの手:", move);

      const toRow = move.to.row;
      const toCol = move.to.col;

      if (move.drop) {
        const droppedType = aiPieceToJapanese(move.piece);

        board[toRow][toCol] = {
          type: droppedType,
          owner: turn,
          promoted: false
        };

        rememberLastMove({
          drop: true,
          from: null,
          to: { row: toRow, col: toCol },
          owner: turn,
          piece: droppedType,
          promote: false
        });

        if (turn === "player") {
          removeOnePieceFromHand(playerHand, droppedType);
        } else {
          removeOnePieceFromHand(enemyHand, droppedType);
        }

        setStatus(`AIが${droppedType}を打ちました。`);
      } else {
        const fromRow = move.from.row;
        const fromCol = move.from.col;

        const movingPiece = board[fromRow][fromCol];
        const capturedPiece = board[toRow][toCol];

        if (!movingPiece) {
          console.error("AIの移動元に駒がありません", move);
          return;
        }

        if (capturedPiece) {
          const capturedType = demotePiece(capturedPiece.type);

          if (turn === "player") {
            playerHand.push(capturedType);
          } else {
            enemyHand.push(capturedType);
          }
        }

        let newType = movingPiece.type;

        if (move.promote) {
          newType = promotePieceType(newType);
        }

        board[fromRow][fromCol] = null;
        board[toRow][toCol] = {
          type: newType,
          owner: movingPiece.owner,
          promoted: move.promote || movingPiece.promoted || false
        };

        rememberLastMove({
          drop: false,
          from: { row: fromRow, col: fromCol },
          to: { row: toRow, col: toCol },
          owner: movingPiece.owner,
          piece: newType,
          promote: move.promote || false
        });

        setStatus(`AIが${newType}を動かしました。`);
      }

      selected = null;
      selectedHandPiece = null;

      switchTurn();
      renderBoard();
    }

    function isPathClear(fromRow, fromCol, toRow, toCol) {
      const rowStep = Math.sign(toRow - fromRow);
      const colStep = Math.sign(toCol - fromCol);
      let row = fromRow + rowStep;
      let col = fromCol + colStep;

      while (row !== toRow || col !== toCol) {
        if (board[row][col]) return false;
        row += rowStep;
        col += colStep;
      }

      return true;
    }

    function getLegalMoves(row, col) {
      const piece = board[row][col];
      if (!piece) return [];

      const moves = [];
      for (let toRow = 0; toRow < 9; toRow++) {
        for (let toCol = 0; toCol < 9; toCol++) {
          if (isLegalMove(piece, row, col, toRow, toCol)) {
            moves.push({ row: toRow, col: toCol });
          }
        }
      }
      return moves;
    }

    function renderHands() {
      renderHand("player", playerHand, document.getElementById("playerHand"));
      renderHand("enemy", enemyHand, document.getElementById("enemyHand"));
    }

    function renderHand(owner, hand, element) {
      element.innerHTML = "";

      if (hand.length === 0) {
        element.textContent = "なし";
        return;
      }

      hand.forEach((pieceType, index) => {
        const button = document.createElement("button");
        button.className = "hand-piece-button";
        button.textContent = pieceType;

        if (
          selectedHandPiece &&
          selectedHandPiece.owner === owner &&
          selectedHandPiece.index === index
        ) {
          button.classList.add("selected");
        }

        button.onclick = async () => {
          if (gameOver) {
            setStatus("対局は終了しています。初期配置に戻すと再開できます。");
            return;
          }

          if (!gameStarted) {
            setStatus("対局スタートを押してから指してください。");
            return;
          }

          if (!isHumanTurn()) {
            setStatus(`今はAI（${ownerLabel(aiSide)}）の番です。`);
            return;
          }

          if (owner !== turn) {
            setStatus(`今は${ownerLabel(turn)}の番です。`);
            return;
          }

          selected = null;
          selectedHandPiece = { owner, index, type: pieceType };

          await fetchLegalMovesFromPython();

          setStatus(`${pieceType}を打つ場所を選んでください。`);
          renderBoard();
        };

        element.appendChild(button);
      });
    }

    function renderBoard() {
      renderHands();
      boardElement.innerHTML = "";

      for (let displayRow = 0; displayRow < 9; displayRow++) {
        for (let displayCol = 0; displayCol < 9; displayCol++) {
          const pos = toBoardPosition(displayRow, displayCol);
          const row = pos.row;
          const col = pos.col;

          const cell = document.createElement("div");
          cell.className = "cell";

          if (selected && selected.row === row && selected.col === col) {
            cell.classList.add("selected");
          }

          if ((selected || selectedHandPiece) && isSelectedLegalMove(row, col)) {
            cell.classList.add("can-move");
          }

          if (lastMove) {
            if (!lastMove.drop && isSameSquare(lastMove.from, row, col)) {
              cell.classList.add("last-move-from");
              addMoveEffectClass(cell);
            }

            if (!lastMove.drop && isSameSquare(lastMove.to, row, col)) {
              cell.classList.add("last-move-to");
              addMoveEffectClass(cell);
            }

            if (lastMove.drop && isSameSquare(lastMove.to, row, col)) {
              cell.classList.add("last-move-drop");
              addMoveEffectClass(cell);
            }
          }

          const piece = board[row][col];

          if (piece) {
            const pieceElement = document.createElement("div");
            pieceElement.className = `piece ${piece.owner}`;

            if (shouldFlipPiece(piece.owner)) {
              pieceElement.classList.add("flipped-piece");
            }

            if (piece.promoted) {
              pieceElement.classList.add("promoted");
            }

            if (piece.type.length >= 2) {
              pieceElement.classList.add("two-letter");
            }

            pieceElement.textContent = piece.type;
            cell.appendChild(pieceElement);
          }

          cell.addEventListener("click", () => handleCellClick(row, col));
          boardElement.appendChild(cell);
        }
      }
    }

    async function handleCellClick(row, col) {

      if (gameOver) {
        setStatus("対局は終了しています。初期配置に戻すと再開できます。");
        return;
      }

      if (!gameStarted) {
        setStatus("対局スタートを押してから指してください。");
        return;
      }

      if (!isHumanTurn()) {
        setStatus(`今はAI（${ownerLabel(aiSide)}）の番です。`);
        return;
      }

      if (selectedHandPiece) {
        await handleDropPiece(row, col);
        return;
      }

      const clickedPiece = board[row][col];

      if (!selected) {
        if (!clickedPiece) {
          setStatus("そこには駒がありません。動かしたい駒をクリックしてください。");
          return;
        }

        if (clickedPiece.owner !== turn) {
          setStatus(`今は${turn === "player" ? "先手" : "後手"}の番です。`);
          return;
        }

        await selectBoardPiece(row, col, clickedPiece);
        return;
      }

      if (clickedPiece && clickedPiece.owner === turn) {
        await selectBoardPiece(row, col, clickedPiece);
        return;
      }

      if (selected.row === row && selected.col === col) {
        clearSelection();
        return;
      }

      let legalMove = await chooseLegalMoveForSelected(row, col);

      if (!legalMove) {
        legalMove = await findLegalMoveForSelectedAsync(row, col);
      }

      if (!legalMove) {
        setStatus("その場所には動けません。Python判定で合法手ではありません。");
        renderBoard();
        return;
      }

      const reviewPayload = buildPlayerMoveReviewPayload(legalMove);

      movePiece(selected.row, selected.col, row, col, legalMove.promote);

      selected = null;
      ++selectionRequestId;

      switchTurn();

      await fetchLegalMovesFromPython();

      renderBoard();

      const reviewPromise = reviewPlayerMoveAfterApply(reviewPayload);
      const evaluationPromise = refreshEvaluation();

      Promise.allSettled([reviewPromise, evaluationPromise]).then(() => {
        renderBoard();
      });

      // updatePlayerLevelByMove(beforeScore, currentEvalScore);

      const ended = await checkGameEndOrContinue();
      if (ended) return;

      if (isAiTurn()) {
        setTimeout(requestAiMove, 500);
      }
    }

    async function selectBoardPiece(row, col, clickedPiece) {
      selected = { row, col };
      selectedHandPiece = null;

      const requestId = ++selectionRequestId;

      setStatus(`${clickedPiece.type}を選択しました。合法手を確認しています...`);
      renderBoard();

      await fetchLegalMovesFromPython();

      if (requestId !== selectionRequestId) {
        return;
      }

      const selectableMoves = legalMovesCache.filter((move) => {
        return (
          !move.drop &&
          move.from &&
          move.from.row === row &&
          move.from.col === col
        );
      });

      if (selectableMoves.length === 0) {
        setStatus(`${clickedPiece.type}は現在動かせません。別の駒を選んでください。`);
      } else {
        setStatus(`${clickedPiece.type}を選択しました。移動先をクリックしてください。`);
      }

      renderBoard();
    }

    function movePiece(fromRow, fromCol, toRow, toCol, forcePromote = false) {
      const movingPiece = board[fromRow][fromCol];
      const targetPiece = board[toRow][toCol];

      if (!movingPiece) return;

      rememberLastMove({
        drop: false,
        from: { row: fromRow, col: fromCol },
        to: { row: toRow, col: toCol },
        owner: movingPiece.owner,
        piece: movingPiece.type,
        promote: forcePromote
      });

      board[toRow][toCol] = movingPiece;
      board[fromRow][fromCol] = null;

      if (forcePromote) {
        promotePiece(movingPiece);
      }

      if (targetPiece) {
        const capturedType = demotePiece(targetPiece.type);

        if (movingPiece.owner === "player") {
          playerHand.push(capturedType);
        } else {
          enemyHand.push(capturedType);
        }

        setStatus(`${movingPiece.type}で${targetPiece.type}を取りました。`);
      } else {
        setStatus(`${movingPiece.type}を動かしました。`);
      }
    }

    async function handleDropPiece(row, col) {
      // const beforeScore = currentEvalScore;

      const legalMove = await findLegalMoveForSelectedAsync(row, col);

      if (!legalMove) {
        setStatus("その場所には打てません。Python判定で合法手ではありません。");
        return;
      }

      const reviewPayload = buildPlayerMoveReviewPayload(legalMove);

      const droppedPiece = {
        type: selectedHandPiece.type,
        owner: selectedHandPiece.owner,
        promoted: false
      };

      board[row][col] = droppedPiece;

      rememberLastMove({
        drop: true,
        from: null,
        to: { row, col },
        owner: droppedPiece.owner,
        piece: droppedPiece.type,
        promote: false
      });

      if (selectedHandPiece.owner === "player") {
        playerHand.splice(selectedHandPiece.index, 1);
      } else {
        enemyHand.splice(selectedHandPiece.index, 1);
      }

      selectedHandPiece = null;
      clearLegalMovesCache();

      setStatus(`${droppedPiece.type}を打ちました。`);

      switchTurn();
      renderBoard();

      const reviewPromise = reviewPlayerMoveAfterApply(reviewPayload);
      const evaluationPromise = refreshEvaluation();

      Promise.allSettled([reviewPromise, evaluationPromise]).then(() => {
        renderBoard();
      });

      // updatePlayerLevelByMove(beforeScore, currentEvalScore);

      const ended = await checkGameEndOrContinue();
      if (ended) return;

      if (isAiTurn()) {
        setTimeout(requestAiMove, 500);
      }
    }

    async function checkGameEndOrContinue() {
      const moves = await fetchLegalMovesFromPython();

      if (moves.length === 0) {
        await handleNoLegalMoves(turn);
        return true;
      }

      clearLegalMovesCache();
      return false;
    }

    function hasPawnInColumn(col, owner) {
      for (let row = 0; row < 9; row++) {
        const piece = board[row][col];
        if (piece && piece.owner === owner && piece.type === PIECES.PAWN) {
          return true;
        }
      }
      return false;
    }

    function canDropPiece(type, row, owner) {
      if (owner === "player") {
        if (type === PIECES.PAWN || type === PIECES.LANCE) return row !== 0;
        if (type === PIECES.KNIGHT) return row > 1;
      }

      if (owner === "enemy") {
        if (type === PIECES.PAWN || type === PIECES.LANCE) return row !== 8;
        if (type === PIECES.KNIGHT) return row < 7;
      }

      return true;
    }

    function canPromote(piece, fromRow, toRow) {
      if (!piece || piece.promoted) return false;

      const promotable = [
        PIECES.PAWN,
        PIECES.LANCE,
        PIECES.KNIGHT,
        PIECES.SILVER,
        PIECES.ROOK,
        PIECES.BISHOP
      ];

      if (!promotable.includes(piece.type)) return false;

      const promotionZone = piece.owner === "player" ? [0, 1, 2] : [6, 7, 8];
      return promotionZone.includes(fromRow) || promotionZone.includes(toRow);
    }

    function promotePiece(piece) {
      piece.promoted = true;

      switch (piece.type) {
        case PIECES.PAWN:
          piece.type = "と";
          break;
        case PIECES.LANCE:
          piece.type = "成香";
          break;
        case PIECES.KNIGHT:
          piece.type = "成桂";
          break;
        case PIECES.SILVER:
          piece.type = "成銀";
          break;
        case PIECES.ROOK:
          piece.type = "龍";
          break;
        case PIECES.BISHOP:
          piece.type = "馬";
          break;
      }
    }

    function demotePiece(type) {
      switch (type) {
        case "と": return PIECES.PAWN;
        case "成香": return PIECES.LANCE;
        case "成桂": return PIECES.KNIGHT;
        case "成銀": return PIECES.SILVER;
        case "龍": return PIECES.ROOK;
        case "馬": return PIECES.BISHOP;
        default: return type;
      }
    }

    function switchTurn() {
      stopTurnTimer();
      turn = turn === "player" ? "enemy" : "player";
      setStatus(`${turn === "player" ? "先手" : "後手"}の番です。`);
      startTurnTimer();
    }

    function clearSelection() {
      selected = null;
      selectedHandPiece = null;
      ++selectionRequestId;
      clearLegalMovesCache();
      setStatus("選択を解除しました。駒をクリックしてください。");
      renderBoard();
    }

    function resetGame() {
      stopTurnTimer();
      gameOver = false;
      gameStarted = false;
      answerPromotion(false);

      board = createInitialBoard();

      // 将棋は必ず先手から開始
      turn = "player";

      selected = null;
      selectedHandPiece = null;
      playerHand = [];
      enemyHand = [];
      playerLevel = 0.35;
      currentEvalScore = 0;

      clearLastMove();

      clearLegalMovesCache();
      updateSideButtons();
      updateMoveEffectButtons();
      updateStartButton();
      resetClocks();

      setStatus(`初期配置に戻しました。あなたは${ownerLabel(humanSide)}です。対局スタートを押すと開始します。`);

      renderBoard();
      refreshEvaluation();

      // 人間が後手を選んだ場合でも、対局スタートを押すまではAIを動かさない。
    }

    function getGameState() {
      return {
        board,
        playerHand,
        enemyHand,
        turn,
        playerLevel,
        aiOwner: aiSide
      };
    }
    async function fetchPolicyStatus() {
      try {
        const res = await fetch("http://127.0.0.1:8000/api/policy-status");

        if (!res.ok) {
          console.error("Policy status API error:", res.status);
          return;
        }

        const data = await res.json();

        const modeElement = document.getElementById("evalMode");
        if (!modeElement) return;

        if (data.available) {
          modeElement.textContent = `POLICY AI / ${data.device}`;
        } else {
          modeElement.textContent = "POLICY DUMMY";
        }

        console.log("policy status:", data);
      } catch (error) {
        console.error("policy status error:", error);
      }
    }

    function updateEvaluationUI(data) {
      const evalScoreElement = document.getElementById("evalScore");
      const aiWinRateElement = document.getElementById("aiWinRate");
      const playerWinRateElement = document.getElementById("playerWinRate");
      const playerWinRateBarElement = document.getElementById("playerWinRateBar");
      const evalModeElement = document.getElementById("evalMode");

      if (!evalScoreElement) return;

      const score = Number(data.score ?? 0);
      currentEvalScore = score;
      const aiWinRate = Number(data.aiWinRate ?? 50);
      const playerWinRate = Number(data.playerWinRate ?? (100 - aiWinRate));

      if (score > 0) {
        evalScoreElement.textContent = `+${score}`;
        evalScoreElement.className = "evaluation-score plus";
      } else if (score < 0) {
        evalScoreElement.textContent = `${score}`;
        evalScoreElement.className = "evaluation-score minus";
      } else {
        evalScoreElement.textContent = "0";
        evalScoreElement.className = "evaluation-score zero";
      }

      aiWinRateElement.textContent = `${aiWinRate}%`;
      playerWinRateElement.textContent = `${playerWinRate}%`;
      playerWinRateBarElement.style.width = `${playerWinRate}%`;

      evalModeElement.textContent = data.mode || "CURRENT POSITION";
    }

    function updatePlayerLevelByMove(beforeScore, afterScore) {
      const improvement = beforeScore - afterScore;

      if (improvement >= 500) {
        playerLevel += 0.08;
      } else if (improvement >= 250) {
        playerLevel += 0.05;
      } else if (improvement >= 100) {
        playerLevel += 0.025;
      } else if (improvement <= -500) {
        playerLevel -= 0.08;
      } else if (improvement <= -250) {
        playerLevel -= 0.05;
      } else if (improvement <= -100) {
        playerLevel -= 0.025;
      }

      playerLevel = Math.max(0.05, Math.min(1.0, playerLevel));

      console.log("playerLevel:", playerLevel, "improvement:", improvement);
    }

    function cloneForApi(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function buildPlayerMoveReviewPayload(legalMove) {
      return {
        board: cloneForApi(board),
        playerHand: cloneForApi(playerHand),
        enemyHand: cloneForApi(enemyHand),
        turn: turn,
        playerLevel: playerLevel,
        aiOwner: aiSide,
        playedMoveId: legalMove.moveId
      };
    }

    async function reviewPlayerMoveAfterApply(payload) {
      if (!payload || !payload.playedMoveId) {
        console.warn("指し手レビュー不可: moveId がありません", payload);
        return null;
      }

      try {
        const res = await fetch("http://127.0.0.1:8000/api/review-player-move", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          console.error("指し手レビューAPIエラー:", res.status, await res.text());
          return null;
        }

        const data = await res.json();

        if (data.ok && typeof data.newPlayerLevel === "number") {
          playerLevel = Math.max(0.05, Math.min(1.0, data.newPlayerLevel));
          console.log("PLAYER MOVE REVIEW:", data);
        }

        return data;
      } catch (error) {
        console.error("指し手レビュー通信エラー:", error);
        return null;
      }
    }

    async function refreshEvaluation() {
      try {
        const response = await fetch("http://127.0.0.1:8000/api/evaluate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(getGameState())
        });

        if (!response.ok) {
          console.error("評価値APIエラー:", response.status);
          return;
        }

        const data = await response.json();

        updateEvaluationUI({
          ...data,
          mode: "CURRENT POSITION"
        });
      } catch (error) {
        console.error("評価値取得エラー:", error);
      }
    }

    async function sendBoardToPython() {
      const gameState = getGameState();

      try {
        const response = await fetch("http://127.0.0.1:8000/api/ai-move-strong", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(gameState)
        });

        if (!response.ok) {
          throw new Error("Python APIから正常な返答がありませんでした。");
        }

        const data = await response.json();
        setStatus(`Pythonから返答がありました。
${JSON.stringify(data, null, 2)}`);
      } catch (error) {
        setStatus(`Python APIへ接続できませんでした。
${error.message}`);
      }
    }

    function setStatus(message) {
      statusElement.textContent = message;
    }

    resetGame();
  </script>
</body>
